<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirming your account — IMS</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="standalone-auth-page">
    <div class="bg-decor">
      <div class="bg-glow"></div>
      <div class="bg-barcode"></div>
    </div>
    <div class="auth-card">
      <div class="auth-title"><img src="https://i.ibb.co/mVgtpqGB/INNOVPHIL-LOGO-Blue.png" alt="INNOVPHIL-LOGO-Blue"></div>
      <p class="gt-title" id="confirmTitle">Confirming your account…</p>
      <p class="auth-subtitle" id="confirmSubtitle">Hang tight, this only takes a second.</p>
      <div id="confirmSpinner" style="text-align:center; margin: 16px 0;">
        <div class="auth-spinner"></div>
      </div>
      <button onclick="window.location.href='/login/'" id="confirmGoLoginBtn" class="auth-btn" style="display:none;">GO TO LOGIN</button>
      <button onclick="window.location.href='/dashboard/'" id="confirmGoDashboardBtn" class="auth-btn" style="display:none;">GO TO DASHBOARD</button>
    </div>

    <script src="/shared/supabase-client.js"></script>
    <script src="/confirm/confirm.js"></script>

    <style>
      .auth-spinner {
        width: 28px;
        height: 28px;
        margin: 0 auto;
        border: 3px solid rgba(0,0,0,0.1);
        border-top-color: #1a1f4d;
        border-radius: 50%;
        animation: auth-spin 0.8s linear infinite;
      }
      @keyframes auth-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
