<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innovphil Asset Portal</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #06101f;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        animation: splashOut 0.6s ease 2.6s forwards;
      }

      .splash-logo {
        width: 96px;
        height: auto;
        /* Recolors the existing navy logo asset to white for the dark splash background */
        filter: brightness(0) invert(1);
        opacity: 0;
        transform: scale(0.6);
        animation: logoIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
      }

      .splash-word {
        margin-top: 18px;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 2px;
        color: #fff;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeUp 0.6s ease 0.45s forwards;
      }

      .splash-tagline {
        margin-top: 8px;
        font-size: 13px;
        letter-spacing: 1px;
        color: #93a3bd;
        opacity: 0;
        transform: translateY(8px);
        animation: fadeUp 0.6s ease 0.7s forwards;
      }

      .splash-bar {
        margin-top: 28px;
        width: 120px;
        height: 3px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.6s ease 0.95s forwards;
      }
      .splash-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 3px;
        background: #4c6fff;
        animation: barSlide 1.3s ease-in-out 1.1s infinite;
      }

      @keyframes logoIn {
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes barSlide {
        0% { transform: translateX(-120%); }
        50% { transform: translateX(80%); }
        100% { transform: translateX(220%); }
      }
      @keyframes splashOut {
        to { opacity: 0; transform: scale(1.03); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <img
        class="splash-logo"
        src="https://i.ibb.co/mVgtpqGB/INNOVPHIL-LOGO-Blue.png"
        alt="Innovphil"
      />
      <div class="splash-word">INNOVPHIL</div>
      <div class="splash-tagline">INVENTORY MANAGEMENT SYSTEM</div>
      <div class="splash-bar"></div>
    </div>

    <script>
      // Redirect once the splash animation has finished playing (matches
      // the .splash fade-out timing above: 2.6s hold + 0.6s fade = 3.2s).
      const session = JSON.parse(sessionStorage.getItem('ACTIVE_SESSION')) || null;
      const destination = session ? '/dashboard/' : '/login/';
      setTimeout(() => {
        window.location.href = destination;
      }, 3200);
    </script>
  </body>
</html>
